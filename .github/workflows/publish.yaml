name: Publish Release

# Builds the single merged plugin DLL and attaches it to the release that
# triggered this workflow. To cut a release: tag + 'gh release create' (or
# create the release in the GitHub UI). This workflow runs on 'published'
# so it also fires for releases promoted from draft state.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Publish plugin DLL
        run: dotnet publish Jellyfin.Plugin.Spwnjp/Jellyfin.Plugin.Spwnjp.csproj
             --configuration Release
             --output ./artifact

      - name: Attach plugin DLL to release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifact/Jellyfin.Plugin.Spwnjp.dll
          fail_on_unmatched_files: true
