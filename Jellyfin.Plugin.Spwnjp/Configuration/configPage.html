<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Spwnjp</title>
</head>
<body>
    <div id="SpwnjpConfigPage" data-role="page" class="page type-interior pluginConfigurationPage" data-require="emby-input,emby-button">
        <div data-role="content">
            <div class="content-primary">
                <form id="SpwnjpConfigForm">
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="HeadlessShellUrl">Headless shell URL</label>
                        <input id="HeadlessShellUrl" name="HeadlessShellUrl" type="url" is="emby-input" />
                        <div class="fieldDescription">
                            Optional. Base URL of a <a href="https://github.com/chromedp/docker-headless-shell" target="_blank" rel="noopener noreferrer">headless-shell</a> instance used to render spwn.jp pages before scraping. Required for event pages whose data is not in the raw HTTP response. Example: <code>http://localhost:9222</code>. Leave empty to use plain HTTP fetches.
                        </div>
                    </div>
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
        <script type="text/javascript">
            var SpwnjpConfig = {
                pluginUniqueId: '1665ca06-677c-4f4e-9292-72552207d00e'
            };

            document.querySelector('#SpwnjpConfigPage')
                .addEventListener('pageshow', function() {
                    Dashboard.showLoadingMsg();
                    ApiClient.getPluginConfiguration(SpwnjpConfig.pluginUniqueId).then(function (config) {
                        document.querySelector('#HeadlessShellUrl').value = config.HeadlessShellUrl || '';
                        Dashboard.hideLoadingMsg();
                    });
                });

            document.querySelector('#SpwnjpConfigForm')
                .addEventListener('submit', function(e) {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(SpwnjpConfig.pluginUniqueId).then(function (config) {
                    config.HeadlessShellUrl = document.querySelector('#HeadlessShellUrl').value.trim();
                    ApiClient.updatePluginConfiguration(SpwnjpConfig.pluginUniqueId, config).then(function (result) {
                        Dashboard.processPluginConfigurationUpdateResult(result);
                    });
                });

                e.preventDefault();
                return false;
            });
        </script>
    </div>
</body>
</html>
